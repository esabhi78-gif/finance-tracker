<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Manage Your Money</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>💰 Finance Tracker</h1>
                <p class="subtitle">Take control of your finances</p>
            </div>
        </header>

        <!-- Dashboard Cards -->
        <div class="dashboard">
            <div class="card balance-card">
                <div class="card-label">Total Balance</div>
                <div class="card-value" id="totalBalance">$0.00</div>
            </div>
            <div class="card income-card">
                <div class="card-label">Total Income</div>
                <div class="card-value" id="totalIncome">$0.00</div>
            </div>
            <div class="card expense-card">
                <div class="card-label">Total Expenses</div>
                <div class="card-value" id="totalExpense">$0.00</div>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="form-container">
            <h2>Add New Transaction</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Coffee, Salary, Gas" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <button type="submit" class="btn btn-primary">Add Transaction</button>
            </form>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="income">Income</button>
            <button class="filter-btn" data-filter="expense">Expense</button>
            <button class="filter-btn danger" id="clearBtn">Clear All</button>
        </div>

        <!-- Transactions List -->
        <div class="transactions-container">
            <h2>Transactions</h2>
            <div id="transactionsList" class="transactions-list">
                <p class="empty-state">No transactions yet. Add one to get started! 🚀</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
